name: Deploy
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Inject Firebase config
        run: |
          sed -i 's|YOUR_API_KEY|${{ secrets.FIREBASE_API_KEY }}|g' focus.html
          sed -i 's|YOUR_PROJECT_ID|${{ secrets.FIREBASE_PROJECT_ID }}|g' focus.html
          sed -i 's|YOUR_PROJECT.firebaseapp.com|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g' focus.html
          sed -i 's|YOUR_PROJECT.appspot.com|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g' focus.html
          sed -i 's|YOUR_SENDER_ID|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g' focus.html
          sed -i 's|YOUR_APP_ID|${{ secrets.FIREBASE_APP_ID }}|g' focus.html
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
