<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · Quiet Place</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #b6c8ff;
      --accent2: #7fa3ff;
      --text: #e8eaf0;
      --muted: rgba(232,234,240,0.45);
      --radius: 18px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; font-weight: 300;
      overflow: hidden;
    }

    /* ── Particles BG ── */
    #bg-canvas {
      position: fixed; inset: 0; width: 100vw; height: 100vh;
      z-index: 0; pointer-events: none;
    }

    /* ── Shell ── */
    .shell {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px;
    }

    /* ── Brand above card ── */
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; letter-spacing: 4px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 36px;
      opacity: 0; transform: translateY(-10px);
      animation: fadeUp 0.7s ease 0.1s forwards;
    }
    .brand span { color: var(--accent); }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 380px;
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      backdrop-filter: blur(24px);
      display: flex; flex-direction: column; align-items: center; gap: 0;
      opacity: 0; transform: translateY(16px);
      animation: fadeUp 0.7s ease 0.25s forwards;
    }

    .card-eyebrow {
      font-size: 0.62rem; letter-spacing: 3px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 16px;
    }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.85rem; font-weight: 400;
      color: var(--text); text-align: center;
      line-height: 1.25; margin-bottom: 10px;
    }
    .card-sub {
      font-size: 0.73rem; color: var(--muted);
      text-align: center; line-height: 1.65;
      margin-bottom: 38px;
      max-width: 280px;
    }

    /* ── Divider ── */
    .divider {
      width: 100%; display: flex; align-items: center; gap: 12px;
      margin-bottom: 22px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-txt {
      font-size: 0.6rem; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      white-space: nowrap;
    }

    /* ── Buttons ── */
    .btn-google {
      width: 100%; display: flex; align-items: center; justify-content: center;
      gap: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 50px; padding: 14px 24px;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.82rem; font-weight: 400;
      cursor: pointer; transition: all 0.3s;
      margin-bottom: 14px;
      position: relative; overflow: hidden;
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.11);
      border-color: rgba(255,255,255,0.24);
      transform: translateY(-1px);
    }
    .btn-google:active { transform: translateY(0); }
    .btn-google .g-icon {
      width: 18px; height: 18px; flex-shrink: 0;
    }
    .btn-google.loading { pointer-events: none; opacity: 0.6; }

    .btn-guest {
      width: 100%; display: flex; align-items: center; justify-content: center;
      gap: 8px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 50px; padding: 12px 24px;
      color: var(--muted); font-family: 'Inter', sans-serif;
      font-size: 0.78rem; font-weight: 300;
      cursor: pointer; transition: all 0.3s;
      letter-spacing: 0.3px;
    }
    .btn-guest:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.14);
    }

    /* ── User state (post-login) ── */
    .user-state {
      display: none; flex-direction: column; align-items: center; gap: 18px;
      text-align: center;
    }
    .user-state.visible { display: flex; }
    .user-avatar {
      width: 60px; height: 60px; border-radius: 50%;
      border: 2px solid rgba(127,163,255,0.3);
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      object-fit: cover;
    }
    .user-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; color: var(--text);
    }
    .user-email { font-size: 0.72rem; color: var(--muted); }

    .btn-continue {
      display: flex; align-items: center; gap: 9px;
      background: rgba(127,163,255,0.1);
      border: 1px solid rgba(127,163,255,0.3);
      border-radius: 50px; padding: 13px 28px;
      color: var(--accent); font-family: 'Inter', sans-serif;
      font-size: 0.8rem; font-weight: 400; letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-continue:hover { background: rgba(127,163,255,0.2); transform: translateY(-1px); }

    .btn-signout {
      background: transparent; border: none;
      font-size: 0.65rem; letter-spacing: 1.5px;
      text-transform: uppercase; color: rgba(232,234,240,0.25);
      cursor: pointer; transition: color 0.3s; padding: 4px;
    }
    .btn-signout:hover { color: var(--muted); }

    /* ── Login forms (pre-login) ── */
    .pre-login { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .pre-login.hidden { display: none; }

    /* ── Privacy note ── */
    .privacy-note {
      margin-top: 28px;
      font-size: 0.62rem; color: rgba(232,234,240,0.2);
      text-align: center; line-height: 1.6;
      letter-spacing: 0.2px;
    }

    /* ── Loading spinner ── */
    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.15);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    .spinner.active { display: block; }

    /* ── Toast ── */
    #notify {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(14,14,28,0.95); border: 1px solid var(--border);
      backdrop-filter: blur(20px); border-radius: 40px;
      padding: 11px 24px; color: var(--text); z-index: 200;
      opacity: 0; transition: all 0.5s; pointer-events: none;
      white-space: nowrap; font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; letter-spacing: 1px;
    }
    #notify.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Animations ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Subtle glow behind card ── */
    .card-glow {
      position: fixed;
      width: 480px; height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(127,163,255,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 1;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="card-glow"></div>

<div class="shell">

  <div class="brand">Quiet <span>Place</span></div>

  <div class="card" id="main-card">
    <div class="card-eyebrow">Your Progress</div>
    <div class="card-title">Save your focus<br>across devices</div>
    <div class="card-sub">Sync your streak, sessions, and history<br>everywhere you work.</div>

    <!-- Pre-login view -->
    <div class="pre-login" id="pre-login">
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-txt">sign in</div>
        <div class="divider-line"></div>
      </div>

      <button class="btn-google" id="btn-google" onclick="signInWithGoogle()">
        <svg class="g-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span>Continue with Google</span>
        <div class="spinner" id="google-spinner"></div>
      </button>

      <button class="btn-guest" id="btn-guest" onclick="continueAsGuest()">
        Continue as guest &nbsp;→
      </button>
    </div>

    <!-- Post-login view -->
    <div class="user-state" id="user-state">
      <img class="user-avatar" id="user-avatar" src="" alt="">
      <div>
        <div class="user-name" id="user-name">—</div>
        <div class="user-email" id="user-email">—</div>
      </div>
      <button class="btn-continue" onclick="goToFocus()">✦ &nbsp;Return to Focus</button>
      <button class="btn-signout" onclick="signOutUser()">Sign out</button>
    </div>

    <div class="privacy-note">
      No ads. No tracking. Only your focus data, securely stored.
    </div>
  </div>

</div>

<div id="notify"></div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup,
    onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  /* ─────────────────────────────────────────────
     🔧 REPLACE WITH YOUR FIREBASE CONFIG
     (Firebase Console → Project Settings → Your apps)
  ───────────────────────────────────────────── */
  const firebaseConfig = {
     apiKey: "AIzaSyDwZRbkuB6P8Tj-rjE2vpu01Ha4LccN1UI",
    authDomain: "quiet-place-3b3cb.firebaseapp.com",
    projectId: "quiet-place-3b3cb",
    storageBucket: "quiet-place-3b3cb.firebasestorage.app",
    messagingSenderId: "1018921272941",
    appId: "1:1018921272941:web:6a598c3704378e2f256164",
    measurementId: "G-P32BNTE1MN"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  /* ── Particles BG ── */
  const bgCanvas = document.getElementById('bg-canvas');
  const bgCtx    = bgCanvas.getContext('2d');
  let particles  = [];

  function initCanvas() {
    bgCanvas.width  = window.innerWidth;
    bgCanvas.height = window.innerHeight;
    particles = [];
    for (let i = 0; i < 60; i++) particles.push({
      x: Math.random() * bgCanvas.width, y: Math.random() * bgCanvas.height,
      r: Math.random() * 1.2 + 0.3,
      dx: (Math.random() - 0.5) * 0.15, dy: (Math.random() - 0.5) * 0.15,
      tw: Math.random() * Math.PI * 2
    });
  }
  initCanvas();
  window.addEventListener('resize', initCanvas);

  function drawBg() {
    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
    for (const p of particles) {
      p.x += p.dx; p.y += p.dy; p.tw += 0.02;
      if (p.x < 0) p.x = bgCanvas.width; if (p.x > bgCanvas.width) p.x = 0;
      if (p.y < 0) p.y = bgCanvas.height; if (p.y > bgCanvas.height) p.y = 0;
      bgCtx.beginPath(); bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      bgCtx.fillStyle = `rgba(127,163,255,${0.3 + 0.3 * Math.sin(p.tw)})`;
      bgCtx.shadowColor = '#7fa3ff'; bgCtx.shadowBlur = 6;
      bgCtx.fill(); bgCtx.shadowBlur = 0;
    }
    requestAnimationFrame(drawBg);
  }
  drawBg();

  /* ── Toast ── */
  let ntTimer = null;
  function showNotify(msg) {
    const el = document.getElementById('notify');
    el.textContent = msg; el.classList.add('show');
    if (ntTimer) clearTimeout(ntTimer);
    ntTimer = setTimeout(() => el.classList.remove('show'), 3500);
  }
  window.showNotify = showNotify;

  /* ── Redirect target ── */
  function getRedirect() {
    const p = new URLSearchParams(location.search).get('from');
    return p || 'focus.html';
  }

  /* ── Go to focus page ── */
  window.goToFocus = function () {
    showNotify('✦ Returning to focus…');
    setTimeout(() => { location.href = getRedirect(); }, 700);
  };

  /* ── Auth state observer ── */
  onAuthStateChanged(auth, user => {
    if (user) {
      showUserState(user);
    } else {
      showPreLogin();
    }
  });

  function showUserState(user) {
    document.getElementById('pre-login').classList.add('hidden');
    const us = document.getElementById('user-state');
    us.classList.add('visible');
    document.getElementById('user-avatar').src  = user.photoURL || '';
    document.getElementById('user-name').textContent  = user.displayName || 'Focus User';
    document.getElementById('user-email').textContent = user.email || 'Guest';
  }

  function showPreLogin() {
    document.getElementById('user-state').classList.remove('visible');
    document.getElementById('pre-login').classList.remove('hidden');
  }

  /* ── Google Sign In ── */
  window.signInWithGoogle = async function () {
    const btn     = document.getElementById('btn-google');
    const spinner = document.getElementById('google-spinner');
    btn.classList.add('loading');
    spinner.classList.add('active');

    const provider = new GoogleAuthProvider();
    try {
      const result = await signInWithPopup(auth, provider);
      const user   = result.user;

      /* Upsert user doc in Firestore */
      await setDoc(doc(db, 'users', user.uid), {
        displayName: user.displayName,
        email:       user.email,
        photoURL:    user.photoURL,
        lastLogin:   serverTimestamp()
      }, { merge: true });

      /* Pull cloud stats back to localStorage for the session */
      await pullCloudStats(user.uid);

      showNotify('✦ Welcome back, ' + (user.displayName?.split(' ')[0] || 'friend') + '.');
      setTimeout(() => { location.href = getRedirect(); }, 900);

    } catch (err) {
      console.error(err);
      if (err.code !== 'auth/popup-closed-by-user') {
        showNotify('⚠ Sign-in failed. Try again.');
      }
      btn.classList.remove('loading');
      spinner.classList.remove('active');
    }
  };

  /* ── Guest ── */
  window.continueAsGuest = function () {
    showNotify('✦ Continuing as guest. Progress stays local.');
    localStorage.setItem('qp_auth_mode', 'guest');
    setTimeout(() => { location.href = getRedirect(); }, 700);
  };

  /* ── Sign Out ── */
  window.signOutUser = async function () {
    await signOut(auth);
    localStorage.removeItem('qp_uid');
    showNotify('✦ Signed out.');
    showPreLogin();
  };

  /* ── Pull cloud stats → localStorage ── */
  async function pullCloudStats(uid) {
    try {
      const TODAY = new Date().toDateString();

      /* Streak */
      const streakSnap = await getDoc(doc(db, 'users', uid, 'data', 'streak'));
      if (streakSnap.exists()) {
        const d = streakSnap.data();
        localStorage.setItem('qp_streak', JSON.stringify({
          streak:   d.streak   || 0,
          lastDate: d.lastDate || null,
          history:  d.history  || []
        }));
      }

      /* Today stats */
      const dateKey   = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
      const statsSnap = await getDoc(doc(db, 'users', uid, 'history', dateKey));
      if (statsSnap.exists()) {
        const d = statsSnap.data();
        localStorage.setItem('qp_focus_stats', JSON.stringify({
          date:     TODAY,
          minutes:  d.minutes  || 0,
          sessions: d.sessions || 0
        }));
      }

      localStorage.setItem('qp_uid', uid);
    } catch (e) {
      console.warn('Cloud pull failed (offline?):', e);
    }
  }
</script>

</body>
</html>
