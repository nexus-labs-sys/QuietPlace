<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · Nexus Study Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:            #0b0905;
      --accent:        #e8a060;
      --accent2:       #f0c080;
      --accent-dim:    rgba(232, 160, 96, 0.45);
      --accent-glow:   rgba(232, 160, 96, 0.15);
      --border:        rgba(255, 220, 160, 0.10);
      --border-warm:   rgba(255, 200, 120, 0.22);
      --surface:       rgba(255, 235, 200, 0.04);
      --text:          #f0e8dc;
      --muted:         rgba(240, 232, 220, 0.40);
      --muted2:        rgba(240, 232, 220, 0.22);
      --radius:        20px;
      --radius-sm:     12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── PARTICLE CANVAS ── */
    #particle-canvas {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    /* ── VIGNETTE ── */
    #vignette {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 70% at 50% 50%, transparent 30%, rgba(5,3,1,0.78) 100%);
    }

    /* ── AMBIENT GLOW ORBS ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      animation: orb-drift ease-in-out infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(232,140,60,0.07) 0%, transparent 70%);
      top: -150px; left: -100px;
      animation-duration: 18s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(180,100,200,0.05) 0%, transparent 70%);
      bottom: -100px; right: -80px;
      animation-duration: 24s;
      animation-delay: -8s;
    }
    .orb-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(240,192,128,0.04) 0%, transparent 70%);
      top: 50%; left: 60%;
      animation-duration: 20s;
      animation-delay: -4s;
    }
    @keyframes orb-drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -20px) scale(1.05); }
      66%       { transform: translate(-20px, 30px) scale(0.95); }
    }

    /* ── LAYOUT ── */
    .page {
      position: relative; z-index: 2;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── LOGIN CARD ── */
    .card {
      width: min(440px, 100%);
      background: rgba(255, 230, 180, 0.05);
      border: 1px solid rgba(255, 210, 140, 0.14);
      border-radius: 30px;
      padding: 56px 48px 48px;
      backdrop-filter: blur(40px) saturate(130%);
      -webkit-backdrop-filter: blur(40px) saturate(130%);
      box-shadow:
        0 0 0 1px rgba(255,220,160,0.04) inset,
        0 0 100px rgba(232, 160, 96, 0.06),
        0 40px 80px rgba(0, 0, 0, 0.55);
      animation: card-rise 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes card-rise {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── BRAND ── */
    .brand {
      text-align: center;
      margin-bottom: 36px;
      animation: fade-in 1s 0.2s both;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.68rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 14px;
    }

    .brand-logo {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(232,160,96,0.22), rgba(240,192,128,0.10));
      border: 1px solid rgba(232,160,96,0.28);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 0 32px rgba(232,160,96,0.12), inset 0 1px 0 rgba(255,220,160,0.2);
      animation: logo-glow 3s ease-in-out infinite;
    }
    @keyframes logo-glow {
      0%, 100% { box-shadow: 0 0 32px rgba(232,160,96,0.12), inset 0 1px 0 rgba(255,220,160,0.2); }
      50%       { box-shadow: 0 0 48px rgba(232,160,96,0.22), inset 0 1px 0 rgba(255,220,160,0.3); }
    }
    .brand-logo svg {
      width: 22px; height: 22px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 1px;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }
    .brand-name em {
      font-style: italic;
      color: var(--accent);
    }

    .brand-sub {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.4px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      background: rgba(255,235,200,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 3px;
      animation: fade-in 1s 0.35s both;
    }
    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border-radius: 9px;
      transition: all 0.3s;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }
    .tab.active {
      background: rgba(232,160,96,0.14);
      border: 1px solid rgba(232,160,96,0.28);
      color: var(--accent2);
    }

    /* ── FORM ── */
    .form { animation: fade-in 1s 0.45s both; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 14px;
    }
    .field label {
      font-size: 0.62rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .field-wrap {
      position: relative;
    }
    .field-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted2);
      font-size: 14px;
      pointer-events: none;
      transition: color 0.3s;
    }
    .field input {
      width: 100%;
      background: rgba(255, 235, 200, 0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 16px 13px 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      caret-color: var(--accent);
    }
    .field input::placeholder { color: var(--muted2); }
    .field input:focus {
      border-color: var(--border-warm);
      background: rgba(255, 235, 200, 0.06);
      box-shadow: 0 0 0 3px rgba(232,160,96,0.06);
    }
    .field input:focus + .field-line { width: 100%; }
    .field-wrap:focus-within .field-icon { color: var(--accent-dim); }

    /* ── FORGOT ── */
    .forgot-row {
      text-align: right;
      margin-top: -6px;
      margin-bottom: 10px;
    }
    .forgot-link {
      font-size: 0.65rem;
      color: var(--muted2);
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: color 0.2s;
      background: none; border: none;
      font-family: 'DM Sans', sans-serif;
    }
    .forgot-link:hover { color: var(--muted); }

    /* ── BUTTONS ── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: linear-gradient(135deg, rgba(232,160,96,0.20), rgba(240,192,128,0.13));
      border: 1px solid rgba(232,160,96,0.38);
      border-radius: var(--radius-sm);
      color: var(--accent2);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(232,160,96,0.12), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:hover {
      border-color: rgba(232,160,96,0.60);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(232,160,96,0.14);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 2px;
      color: var(--muted2);
      margin: 14px 0 8px;
      text-transform: uppercase;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%; width: calc(50% - 18px);
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .btn-guest {
      width: 100%;
      padding: 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-guest:hover {
      border-color: var(--border-warm);
      color: var(--text);
      background: rgba(255,235,200,0.03);
    }

    /* ── ERROR / SUCCESS ── */
    .msg {
      font-size: 0.68rem;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
      transition: all 0.3s;
      letter-spacing: 0.3px;
    }
    .msg.error { color: rgba(224,128,96,0.85); }
    .msg.success { color: rgba(120,200,154,0.85); }

    /* ── FOOTER ── */
    .footer {
      position: fixed;
      bottom: 28px; left: 0; right: 0;
      text-align: center;
      font-size: 0.60rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted2);
      z-index: 3;
      animation: fade-in 1.5s 0.8s both;
    }
    .footer span { color: rgba(232,160,96,0.5); }

    /* ── PAGE TRANSITION ── */
    body.leaving {
      opacity: 0;
      transition: opacity 0.55s ease;
    }

    /* ── LOADING SPINNER ── */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 1.5px solid rgba(240,192,128,0.3);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── REGISTER EXTRA FIELD ── */
    #register-name-field { display: none; }
    .tabs[data-mode="register"] ~ .form #register-name-field { display: flex; }
  </style>
</head>
<body>

<!-- Background layers -->
<canvas id="particle-canvas"></canvas>
<div id="vignette"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="page">
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-eyebrow">Your private study space</div>
      <div class="brand-logo">
        <!-- Flame / study icon -->
        <svg viewBox="0 0 24 24">
          <path d="M12 2C12 2 7 7.5 7 12a5 5 0 0010 0c0-1.5-.5-3-1.5-4.5C15 9 14 10 14 10s1-3-2-8z"/>
          <path d="M12 17a2 2 0 01-2-2c0-1.5 2-3.5 2-3.5s2 2 2 3.5a2 2 0 01-2 2z" stroke-width="1"/>
        </svg>
      </div>
      <div class="brand-name">Nexus <em>Study</em> Lab</div>
      <div class="brand-sub">Focus. Track. Grow.</div>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Form -->
    <div class="form">
      <!-- Register name (shown only on register tab) -->
      <div class="field" id="register-name-field">
        <label>Full Name</label>
        <div class="field-wrap">
          <span class="field-icon">✦</span>
          <input type="text" id="reg-name" placeholder="Your name" autocomplete="name">
        </div>
      </div>

      <div class="field">
        <label>Email</label>
        <div class="field-wrap">
          <span class="field-icon">@</span>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <span class="field-icon">◈</span>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>

      <div class="forgot-row" id="forgot-row">
        <button class="forgot-link" onclick="showForgot()">Forgot password?</button>
      </div>

      <button class="btn-primary" id="main-btn" onclick="handleSubmit()">Enter the Lab</button>

      <div class="divider">or</div>
      <button class="btn-guest" onclick="enterAsGuest()">Continue as Guest</button>

      <div class="msg" id="msg"></div>
    </div>

  </div>
</div>

<!-- Footer -->
<div class="footer">Nexus <span>Study</span> Lab &nbsp;·&nbsp; Private &amp; Secure</div>

<script>
/* ══════════════════════════════════════
   PARTICLE BACKGROUND
══════════════════════════════════════ */
const canvas = document.getElementById('particle-canvas');
const ctx    = canvas.getContext('2d');
let particles = [];

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function initParticles() {
  particles = [];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x:  Math.random() * canvas.width,
      y:  Math.random() * canvas.height,
      r:  Math.random() * 1.2 + 0.3,
      dx: (Math.random() - 0.5) * 0.15,
      dy: (Math.random() - 0.5) * 0.15,
      tw: Math.random() * Math.PI * 2,
    });
  }
}
initParticles();

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of particles) {
    p.x += p.dx; p.y += p.dy; p.tw += 0.016;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    const alpha = 0.14 + 0.20 * Math.sin(p.tw);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232, 160, 96, ${alpha})`;
    ctx.shadowColor = 'rgba(232,160,96,0.5)';
    ctx.shadowBlur  = 6;
    ctx.fill();
    ctx.shadowBlur  = 0;
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ══════════════════════════════════════
   TABS
══════════════════════════════════════ */
let currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  const tabs = document.querySelectorAll('.tab');
  tabs[0].classList.toggle('active', tab === 'login');
  tabs[1].classList.toggle('active', tab === 'register');

  const nameField = document.getElementById('register-name-field');
  const forgotRow = document.getElementById('forgot-row');
  const btn       = document.getElementById('main-btn');
  const pwdInput  = document.getElementById('login-password');

  if (tab === 'register') {
    nameField.style.display = 'flex';
    forgotRow.style.display = 'none';
    btn.textContent = 'Create Account';
    pwdInput.setAttribute('autocomplete', 'new-password');
    pwdInput.setAttribute('placeholder', 'Choose a password');
  } else {
    nameField.style.display = 'none';
    forgotRow.style.display = 'block';
    btn.textContent = 'Enter the Lab';
    pwdInput.setAttribute('autocomplete', 'current-password');
    pwdInput.setAttribute('placeholder', '••••••••');
  }
  clearMsg();
}

/* ══════════════════════════════════════
   NAVIGATION HELPERS
══════════════════════════════════════ */
function navigateTo(url) {
  document.body.style.opacity = '0';
  document.body.style.transition = 'opacity 0.55s ease';
  setTimeout(() => { window.location.href = url; }, 560);
}

function setMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (type || '');
}
function clearMsg() { setMsg('', ''); }

function setLoading(on) {
  const btn = document.getElementById('main-btn');
  btn.disabled = on;
  if (on) {
    btn.innerHTML = '<span class="spinner"></span>One moment…';
  } else {
    btn.textContent = currentTab === 'register' ? 'Create Account' : 'Enter the Lab';
  }
}

/* ══════════════════════════════════════
   AUTH LOGIC
══════════════════════════════════════ */
function handleSubmit() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  clearMsg();

  if (!email || !pass) { setMsg('Please fill in all fields.', 'error'); return; }
  if (!email.includes('@')) { setMsg('Enter a valid email address.', 'error'); return; }
  if (pass.length < 4) { setMsg('Password is too short.', 'error'); return; }

  if (currentTab === 'register') {
    const name = document.getElementById('reg-name').value.trim();
    if (!name) { setMsg('Please enter your name.', 'error'); return; }
    handleRegister(name, email, pass);
  } else {
    handleLogin(email, pass);
  }
}

function handleLogin(email, pass) {
  setLoading(true);

  // Firebase hook (optional)
  if (window.__qp_auth_login) {
    window.__qp_auth_login(email, pass)
      .then(() => {
        localStorage.setItem('nsl_user', JSON.stringify({ email, guest: false }));
        setMsg('Welcome back ✦', 'success');
        setTimeout(() => navigateTo('streak.html'), 600);
      })
      .catch(e => {
        setMsg(e.message || 'Sign-in failed. Check your credentials.', 'error');
        setLoading(false);
      });
  } else {
    // Demo mode — accept any credentials
    setTimeout(() => {
      localStorage.setItem('nsl_user', JSON.stringify({ email, guest: false }));
      setMsg('Welcome back ✦', 'success');
      setTimeout(() => navigateTo('streak.html'), 600);
    }, 700);
  }
}

function handleRegister(name, email, pass) {
  setLoading(true);

  if (window.__qp_auth_register) {
    window.__qp_auth_register(email, pass, name)
      .then(() => {
        localStorage.setItem('nsl_user', JSON.stringify({ email, name, guest: false }));
        setMsg('Account created! Redirecting…', 'success');
        setTimeout(() => navigateTo('streak.html'), 700);
      })
      .catch(e => {
        setMsg(e.message || 'Registration failed.', 'error');
        setLoading(false);
      });
  } else {
    // Demo mode — store and proceed
    setTimeout(() => {
      localStorage.setItem('nsl_user', JSON.stringify({ email, name, guest: false }));
      setMsg('Account created ✦', 'success');
      setTimeout(() => navigateTo('streak.html'), 700);
    }, 700);
  }
}

function enterAsGuest() {
  localStorage.setItem('nsl_user', JSON.stringify({ guest: true }));
  navigateTo('streak.html');
}

function showForgot() {
  setMsg('Password reset: check your email (feature needs Firebase).', 'error');
}

/* ══════════════════════════════════════
   KEYBOARD SHORTCUTS
══════════════════════════════════════ */
document.getElementById('login-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSubmit();
});
document.getElementById('reg-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-email').focus();
});

/* ══════════════════════════════════════
   AUTO-REDIRECT IF ALREADY LOGGED IN
══════════════════════════════════════ */
(function() {
  try {
    const user = JSON.parse(localStorage.getItem('nsl_user'));
    if (user) {
      // Already logged in — skip straight to streak
      document.body.style.opacity = '0';
      window.location.href = 'streak.html';
    }
  } catch(_) {}
})();
</script>
</body>
</html>
