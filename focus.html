<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus · Quiet Place</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #b6c8ff;
      --accent2: #7fa3ff;
      --text: #e8eaf0;
      --muted: rgba(232,234,240,0.45);
      --ring-bg: rgba(255,255,255,0.06);
      --ring-color: #7fa3ff;
      --break-color: #7fd4a0;
      --long-color: #f4a97f;
      --deep-work-color: #c084fc;
      --radius: 20px;
      --panel-w: 340px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; overflow-x: hidden; }

    #gif-bg { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 0; opacity: 0; transition: opacity 1.2s ease; pointer-events: none; display: block; }
    #gif-bg.visible { opacity: 1; }
    #gif-overlay { position: fixed; inset: 0; background: rgba(4,4,12,0.62); z-index: 1; pointer-events: none; opacity: 0; transition: opacity 1.2s ease; }
    #gif-overlay.visible { opacity: 1; }
    #bg-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; transition: opacity 0.8s ease; }
    #bg-canvas.hidden { opacity: 0; }

    /* Hidden YouTube player — off-screen, not display:none (API needs it in DOM) */
    #yt-player-wrap { position: fixed; left: -400px; bottom: -400px; width: 200px; height: 112px; z-index: -1; pointer-events: none; overflow: hidden; }

    .shell { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; }

    nav { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 20px 36px; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); background: rgba(8,8,16,0.65); position: sticky; top: 0; z-index: 10; transition: opacity 0.5s, transform 0.5s; }
    nav.deep-hide { opacity: 0; pointer-events: none; transform: translateY(-8px); }
    .nav-left { display: flex; align-items: center; gap: 22px; }
    .nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; letter-spacing: 3px; color: var(--muted); text-decoration: none; text-transform: uppercase; white-space: nowrap; }
    .nav-brand span { color: var(--accent); }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-size: 0.74rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; white-space: nowrap; }
    .nav-links a:hover { color: var(--text); }
    .nav-center { font-family: 'Cormorant Garamond', serif; font-size: 1rem; letter-spacing: 5px; text-transform: uppercase; color: var(--muted); text-align: center; }
    .nav-right { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
    #panel-toggle-btn { width: 34px; height: 34px; border-radius: 9px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    #panel-toggle-btn:hover { background: rgba(255,255,255,0.09); color: var(--text); }
    #deep-btn { font-size: 0.71rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); background: rgba(127,163,255,0.08); border: 1px solid rgba(127,163,255,0.2); border-radius: 40px; padding: 7px 15px; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
    #deep-btn:hover { background: rgba(127,163,255,0.18); }

    #deep-exit-btn { position: fixed; bottom: 30px; right: 30px; font-size: 0.71rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 40px; padding: 10px 22px; cursor: pointer; z-index: 50; transition: all 0.45s; backdrop-filter: blur(12px); opacity: 0; pointer-events: none; transform: translateY(10px); }
    #deep-exit-btn.visible { opacity: 1; pointer-events: all; transform: translateY(0); }
    #deep-exit-btn:hover { color: var(--text); background: rgba(255,255,255,0.1); }
    body.deep-work-active #deep-exit-btn { opacity: 0 !important; pointer-events: none !important; }

    #panel-edge-btn { position: fixed; top: 50%; right: var(--panel-w); transform: translateY(-50%) translateX(50%); width: 26px; height: 46px; border-radius: 8px; background: rgba(16,16,32,0.88); border: 1px solid var(--border); backdrop-filter: blur(10px); color: var(--muted); cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.35s; }
    #panel-edge-btn:hover { color: var(--text); background: rgba(28,28,56,0.95); }
    #panel-edge-btn.collapsed { right: 0; }
    #panel-edge-btn.deep-gone { opacity: 0; pointer-events: none; }

    main { flex: 1; display: grid; grid-template-columns: 1fr var(--panel-w); transition: grid-template-columns 0.45s cubic-bezier(0.4,0,0.2,1); }
    main.panel-collapsed { grid-template-columns: 1fr 0px; }
    .center-col { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; border-right: 1px solid var(--border); transition: border-color 0.4s; min-width: 0; }
    main.panel-collapsed .center-col { border-right-color: transparent; }
    body.deep-mode .center-col { border-right-color: transparent; }

    .session-pills { display: flex; gap: 10px; margin-bottom: 44px; flex-wrap: wrap; justify-content: center; transition: opacity 0.5s, transform 0.5s; }
    .session-pills.fade-out { opacity: 0; pointer-events: none; transform: translateY(-6px); }
    .pill { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; padding: 8px 18px; border-radius: 40px; cursor: pointer; background: var(--surface); border: 1px solid var(--border); color: var(--muted); transition: all 0.3s; }
    .pill.active { background: rgba(127,163,255,0.12); border-color: rgba(127,163,255,0.4); color: var(--accent); }
    .pill.active.break { background: rgba(127,212,160,0.12); border-color: rgba(127,212,160,0.4); color: var(--break-color); }
    .pill.active.long { background: rgba(244,169,127,0.12); border-color: rgba(244,169,127,0.4); color: var(--long-color); }
    .pill.active.sixty { background: rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.4); color: #fbbf24; }
    body.deep-work-active .pill { pointer-events: none; opacity: 0.4; }
    body.deep-work-active .pill.active { opacity: 1; }

    .ring-wrap { position: relative; width: 280px; height: 280px; margin-bottom: 40px; transition: width 0.5s, height 0.5s; }
    body.deep-mode .ring-wrap { width: 340px; height: 340px; }
    body.deep-work-active .ring-wrap { width: 380px; height: 380px; }
    .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    #ring-track { fill: none; stroke: var(--ring-bg); stroke-width: 4; }
    #ring-fill { fill: none; stroke: var(--ring-color); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 754; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.8s ease; filter: drop-shadow(0 0 10px var(--ring-color)); }
    .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    #timer-display { font-family: 'Cormorant Garamond', serif; font-size: 4.4rem; font-weight: 300; letter-spacing: 4px; line-height: 1; color: var(--text); transition: font-size 0.5s; }
    body.deep-mode #timer-display { font-size: 5.5rem; }
    body.deep-work-active #timer-display { font-size: 6rem; }
    #session-label { font-size: 0.66rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
    body.deep-work-active #ring-fill { stroke: var(--deep-work-color); filter: drop-shadow(0 0 18px var(--deep-work-color)); }

    .controls { display: flex; align-items: center; gap: 16px; margin-bottom: 36px; }
    .ctrl-btn { width: 52px; height: 52px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; font-size: 18px; }
    .ctrl-btn:hover { background: rgba(255,255,255,0.09); transform: scale(1.07); }
    body.deep-work-active .ctrl-btn.hide-in-deep { opacity: 0; pointer-events: none; }
    #play-btn { width: 68px; height: 68px; font-size: 22px; background: rgba(127,163,255,0.12); border-color: rgba(127,163,255,0.35); color: var(--accent); }
    #play-btn:hover { background: rgba(127,163,255,0.22); }
    #play-btn.running { color: #f4a97f; border-color: rgba(244,169,127,0.35); background: rgba(244,169,127,0.10); }
    body.deep-work-active #play-btn { background: rgba(192,132,252,0.12); border-color: rgba(192,132,252,0.35); color: var(--deep-work-color); }
    body.deep-work-active #play-btn.running { color: #f4a97f; border-color: rgba(244,169,127,0.35); background: rgba(244,169,127,0.10); }

    #focus-msg { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-style: italic; color: var(--muted); letter-spacing: 1px; min-height: 28px; transition: opacity 0.8s; }
    .session-dots { display: flex; gap: 8px; margin-top: 26px; transition: opacity 0.5s, transform 0.5s; }
    .session-dots.fade-out { opacity: 0; transform: translateY(4px); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.5s; }
    .dot.done { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    #deep-work-btn { margin-top: 28px; font-size: 0.7rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--deep-work-color); background: rgba(192,132,252,0.07); border: 1px solid rgba(192,132,252,0.25); border-radius: 40px; padding: 11px 26px; cursor: pointer; transition: all 0.4s; display: flex; align-items: center; gap: 8px; }
    #deep-work-btn:hover { background: rgba(192,132,252,0.16); border-color: rgba(192,132,252,0.5); }
    #deep-work-btn.hidden { opacity: 0; pointer-events: none; transform: translateY(6px); }

    #deep-work-status { margin-top: 22px; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0; pointer-events: none; transform: translateY(8px); transition: all 0.5s; }
    #deep-work-status.visible { opacity: 1; pointer-events: all; transform: translateY(0); }
    .dw-badge { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--deep-work-color); background: rgba(192,132,252,0.1); border: 1px solid rgba(192,132,252,0.3); border-radius: 40px; padding: 6px 18px; display: flex; align-items: center; gap: 7px; }
    #dw-exit-btn { margin-top: 4px; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(232,234,240,0.35); background: transparent; border: 1px solid rgba(255,255,255,0.08); border-radius: 40px; padding: 7px 18px; cursor: pointer; transition: all 0.3s; }
    #dw-exit-btn:hover { color: var(--muted); border-color: rgba(255,255,255,0.18); }

    /* ══════════════════════════════════════════
       SIDE PANEL
    ══════════════════════════════════════════ */
    .side-panel { display: flex; flex-direction: column; padding: 36px 26px; gap: 26px; overflow-y: auto; overflow-x: hidden; border-left: 1px solid var(--border); width: var(--panel-w); transition: opacity 0.35s, transform 0.35s; }
    .side-panel.deep-hidden { opacity: 0; pointer-events: none; transform: translateX(20px); }
    main.panel-collapsed .side-panel { opacity: 0; pointer-events: none; padding: 0; overflow: hidden; }
    .panel-section h3 { font-size: 0.66rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 13px; }

    /* ══════════════════════════════════════════
       MUSIC CARD — YouTube
    ══════════════════════════════════════════ */
    .music-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    /* URL input */
    .yt-input-row { display: flex; align-items: center; gap: 0; padding: 11px 14px; border-bottom: 1px solid var(--border); }
    .yt-input-row input { flex: 1; background: transparent; border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 0.71rem; font-weight: 300; color: var(--muted); letter-spacing: 0.3px; caret-color: var(--accent); min-width: 0; }
    .yt-input-row input::placeholder { color: rgba(232,234,240,0.18); }
    .yt-input-row input:focus { color: var(--text); }
    .yt-load-btn { flex-shrink: 0; font-size: 0.63rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); background: rgba(127,163,255,0.08); border: 1px solid rgba(127,163,255,0.22); border-radius: 20px; padding: 5px 12px; cursor: pointer; transition: all 0.3s; white-space: nowrap; margin-left: 8px; }
    .yt-load-btn:hover { background: rgba(127,163,255,0.18); }

    /* Track row */
    .music-track { display: flex; align-items: center; gap: 12px; padding: 14px 14px 6px; }
    .track-art { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid var(--border); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
    .track-art img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; opacity: 0; transition: opacity 0.5s; }
    .track-art img.loaded { opacity: 1; }
    .track-art .art-fallback { font-size: 18px; position: relative; z-index: 1; transition: opacity 0.4s; }
    .track-art.has-thumb .art-fallback { opacity: 0; }
    .track-art.playing::after { content: ''; position: absolute; inset: 0; background: rgba(127,163,255,0.12); animation: pulse-art 2s ease-in-out infinite; z-index: 2; }
    @keyframes pulse-art { 0%,100%{opacity:0.3} 50%{opacity:1} }

    .track-info { flex: 1; min-width: 0; }
    .track-name { font-size: 0.85rem; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity 0.3s; }
    .track-name.fade { opacity: 0.25; }
    .track-artist { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    #music-toggle { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; background: rgba(127,163,255,0.1); border: 1px solid rgba(127,163,255,0.25); color: var(--accent); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    #music-toggle:hover { background: rgba(127,163,255,0.22); }
    #music-toggle:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    /* Prev / Next */
    .music-nav { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 6px 14px; }
    .music-nav-btn { width: 28px; height: 28px; border-radius: 50%; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: all 0.25s; }
    .music-nav-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .music-nav-btn:disabled { opacity: 0.2; cursor: default; pointer-events: none; }

    /* Progress bar */
    .yt-progress-wrap { padding: 2px 14px 6px; }
    .yt-progress-bar { width: 100%; height: 2px; border-radius: 2px; background: var(--border); position: relative; cursor: pointer; }
    .yt-progress-bar:hover { height: 4px; margin-top: -1px; }
    .yt-progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent2), var(--accent)); width: 0%; transition: width 1s linear; pointer-events: none; }

    /* Status row */
    .yt-status { display: flex; align-items: center; gap: 7px; padding: 2px 14px 10px; }
    .yt-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.4s; }
    .yt-status-dot.live { background: #7fd4a0; box-shadow: 0 0 5px #7fd4a0; animation: dot-blink 2s ease-in-out infinite; }
    .yt-status-dot.error { background: #f4a97f; }
    @keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .yt-status-txt { font-size: 0.63rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Volume */
    .volume-row { display: flex; align-items: center; gap: 10px; padding: 4px 14px 14px; }
    .vol-icon { font-size: 13px; color: var(--muted); }
    input[type=range] { flex: 1; -webkit-appearance: none; appearance: none; height: 3px; border-radius: 3px; cursor: pointer; background: linear-gradient(to right, var(--accent2) var(--pct,70%), var(--border) var(--pct,70%)); }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent2); }

    /* BG Picker */
    .bg-picker { display: flex; flex-wrap: wrap; gap: 7px; }
    .bg-chip { font-size: 0.67rem; letter-spacing: 1px; text-transform: uppercase; padding: 6px 13px; border-radius: 30px; cursor: pointer; background: var(--surface); border: 1px solid var(--border); color: var(--muted); transition: all 0.3s; white-space: nowrap; }
    .bg-chip:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .bg-chip.active { background: rgba(127,163,255,0.12); border-color: rgba(127,163,255,0.4); color: var(--accent); }
    .bg-chip.none-chip.active { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.18); color: var(--text); }

    /* Ambient */
    .ambient-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .amb-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 12px 8px; border-radius: 14px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; transition: all 0.3s; color: var(--muted); font-size: 0.7rem; letter-spacing: 1px; }
    .amb-btn .amb-icon { font-size: 20px; }
    .amb-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .amb-btn.active { background: rgba(127,163,255,0.1); border-color: rgba(127,163,255,0.35); color: var(--accent); }

    /* Stats */
    .stats-row { display: flex; gap: 10px; }
    .stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; text-align: center; }
    .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; color: var(--accent); line-height: 1; }
    .stat-lbl { font-size: 0.66rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

    /* Streak */
    .streak-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; display: flex; align-items: center; gap: 14px; }
    .streak-flame { font-size: 1.8rem; }
    .streak-val { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: #f4a97f; line-height: 1; }
    .streak-lbl { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .streak-days { display: flex; gap: 4px; margin-top: 7px; flex-wrap: wrap; }
    .day-dot { width: 19px; height: 19px; border-radius: 5px; background: var(--border); font-size: 8px; display: flex; align-items: center; justify-content: center; color: var(--muted); }
    .day-dot.active { background: rgba(244,169,127,0.22); color: #f4a97f; border: 1px solid rgba(244,169,127,0.35); }

    /* Toast */
    #notify { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: rgba(14,14,28,0.95); border: 1px solid var(--border); backdrop-filter: blur(20px); border-radius: 40px; padding: 12px 26px; color: var(--text); z-index: 100; opacity: 0; transition: all 0.5s; pointer-events: none; white-space: nowrap; font-family: 'Cormorant Garamond', serif; font-size: 1rem; letter-spacing: 1px; }
    #notify.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes dw-pulse-bg { 0%,100%{ background:#04040a; } 50%{ background:#060410; } }
    body.deep-work-active { animation: dw-pulse-bg 8s ease-in-out infinite; }
    body.deep-mode { background: #04040a; }

    @media (max-width: 860px) {
      main { grid-template-columns: 1fr !important; }
      .center-col { border-right: none; border-bottom: 1px solid var(--border); }
      .side-panel { width: 100%; border-left: none; }
      #panel-edge-btn { display: none; }
      nav { padding: 14px 18px; }
      .nav-links { display: none; }
      .nav-center { display: none; }
    }
  </style>
</head>
<body>

<img id="gif-bg" src="" alt="" aria-hidden="true">
<div id="gif-overlay"></div>
<canvas id="bg-canvas"></canvas>

<!-- YouTube hidden player — must stay in DOM for API to work -->
<div id="yt-player-wrap"><div id="yt-player"></div></div>

<div class="shell">
  <nav id="main-nav">
    <div class="nav-left">
      <a href="index.html" class="nav-brand">Quiet <span>Place</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="reflections.html">Reflections</a>
        <a href="gallery.html">Gallery</a>
      </div>
    </div>
    <div class="nav-center">Focus</div>
    <div class="nav-right">
      <button id="panel-toggle-btn" onclick="togglePanel()" title="Toggle details panel">☰</button>
      <button id="deep-btn" onclick="toggleDeep()">✦ Deep Mode</button>
    </div>
  </nav>

  <main id="main-grid">

    <div class="center-col">
      <div class="session-pills" id="session-pills">
        <button class="pill active" data-mode="focus" onclick="switchMode('focus')">Focus</button>
        <button class="pill break" data-mode="break" onclick="switchMode('break')">Short Break</button>
        <button class="pill long" data-mode="long" onclick="switchMode('long')">Long Break</button>
        <button class="pill sixty" data-mode="sixty" onclick="switchMode('sixty')">60 min</button>
      </div>

      <div class="ring-wrap">
        <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
          <circle id="ring-track" cx="120" cy="120" r="110"/>
          <circle id="ring-fill" cx="120" cy="120" r="110"/>

        <div class="ring-center">

      <div class="session-dots" id="session-dots">
        <div class="dot" id="d0"></div>

        <span>⬡</span> Enter Deep Work — 90 min

              placeholder="YouTube playlist or video URL…"

          <!-- Track info -->
          <div class="music-track">
            <div class="track-art" id="track-art">
              <img id="track-thumb" src="" alt="">
              <span class="art-fallback">🎵</span>
            </div>
            <div class="track-info">
              <div class="track-name" id="track-name">No playlist loaded</div>
              <div class="track-artist" id="track-artist">Paste a URL above ↑</div>
            </div>

          <!-- Prev / Next -->

            <button class="music-nav-btn" id="prev-btn" onclick="ytPrev()" disabled title="Previous">⏮</button>
            <button class="music-nav-btn" id="next-btn" onclick="ytNext()" disabled title="Next">⏭</button>

          <!-- Progress -->
          <div class="yt-progress-wrap">

          <!-- Status dot -->
          <div class="yt-status">
            <div class="yt-status-dot" id="yt-status-dot"></div>
            <div class="yt-status-txt" id="yt-status-txt">Waiting for playlist</div>
          </div>

          <!-- Volume -->
          <div class="volume-row">
            <span class="vol-icon">♪</span>
            <input type="range" min="0" max="100" value="70" id="vol-slider" oninput="ytSetVolume(this.value)">

      <div class="panel-section" id="bg-picker-section">
        <h3>Background</h3>

      <div class="panel-section">
        <h3>Ambient Sounds</h3>
        <div class="ambient-grid">
          <button class="amb-btn" data-amb="rain" onclick="toggleAmbient('rain')"><span class="amb-icon">🌧</span>Rain</button>
          <button class="amb-btn" data-amb="cafe" onclick="toggleAmbient('cafe')"><span class="amb-icon">☕</span>Café</button>
          <button class="amb-btn" data-amb="night" onclick="toggleAmbient('night')"><span class="amb-icon">🌙</span>Night</button>
          <button class="amb-btn" data-amb="waves" onclick="toggleAmbient('waves')"><span class="amb-icon">🌊</span>Waves</button>
        </div>
      </div>

      <div class="panel-section">
        <h3>Today's Focus</h3>
        <div class="stats-row">
          <div class="stat-card"><div class="stat-val" id="stat-time">0</div><div class="stat-lbl">Minutes</div></div>
          <div class="stat-card"><div class="stat-val" id="stat-sessions">0</div><div class="stat-lbl">Sessions</div></div>
        </div>
      </div>

      <div class="panel-section">
        <h3>Streak</h3>
        <div class="streak-card">
          <div class="streak-flame">🔥</div>
          <div>
            <div class="streak-val" id="streak-val">0</div>
            <div class="streak-lbl">Day Streak</div>

</div>

<button id="panel-edge-btn" onclick="togglePanel()" title="Toggle panel">›</button>
<button id="deep-exit-btn" onclick="toggleDeep()">✕ Exit Deep Mode</button>
<div id="notify"></div>

<!-- YouTube IFrame API (loaded async, triggers onYouTubeIframeAPIReady) -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
/* ══════════════════════════════════════════════════
   GIF BACKGROUNDS — add your .gif filenames here
══════════════════════════════════════════════════ */
const GIF_BACKGROUNDS = [
  'night.gif',
  'warm.gif'
];
const GIF_OVERLAY_OPACITY = 0.62;

const gifBgEl    = document.getElementById('gif-bg');
const gifOverlay = document.getElementById('gif-overlay');
const bgCanvas   = document.getElementById('bg-canvas');

(function buildBgPicker() {
  const picker = document.getElementById('bg-picker');
  picker.innerHTML = '';
  const noneChip = document.createElement('button');
  noneChip.className = 'bg-chip none-chip active';
  noneChip.textContent = 'Particles';
  noneChip.onclick = () => setGifBg(null, noneChip);
  picker.appendChild(noneChip);
  GIF_BACKGROUNDS.forEach(file => {
    const label = file.replace(/\.(gif|webp)$/i,'').replace(/[-_]/g,' ');
    const chip = document.createElement('button');
    chip.className = 'bg-chip'; chip.textContent = label; chip.dataset.file = file;
    chip.onclick = () => setGifBg(file, chip);
    picker.appendChild(chip);
  });
  if (!GIF_BACKGROUNDS.length) document.getElementById('bg-picker-section').style.display = 'none';
})();

function setGifBg(file, chipEl) {
  document.querySelectorAll('.bg-chip').forEach(c => c.classList.remove('active'));
  if (chipEl) chipEl.classList.add('active');
  if (!file) {
    gifBgEl.classList.remove('visible'); gifOverlay.classList.remove('visible');
    bgCanvas.classList.remove('hidden'); return;
  }
  bgCanvas.classList.add('hidden');
  gifBgEl.classList.remove('visible'); gifBgEl.src = '';
  gifOverlay.style.background = `rgba(4,4,12,${GIF_OVERLAY_OPACITY})`;
  setTimeout(() => {
    gifBgEl.src = file;
    gifBgEl.onload = () => { gifBgEl.classList.add('visible'); gifOverlay.classList.add('visible'); };
    gifBgEl.onerror = () => { showNotify('⚠ GIF not found: ' + file); setGifBg(null, document.querySelector('.none-chip')); };
    setTimeout(() => { if (!gifBgEl.classList.contains('visible')) { gifBgEl.classList.add('visible'); gifOverlay.classList.add('visible'); } }, 350);
  }, 80);
  showNotify('✦ Background changed.');
}

/* ── Particles ── */
const bgCtx = bgCanvas.getContext('2d');
let particles = [];
function initCanvas() {
  bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; particles = [];
  for (let i = 0; i < 60; i++) particles.push({ x: Math.random()*bgCanvas.width, y: Math.random()*bgCanvas.height, r: Math.random()*1.2+0.3, dx: (Math.random()-.5)*.15, dy: (Math.random()-.5)*.15, tw: Math.random()*Math.PI*2 });
}
initCanvas(); window.addEventListener('resize', initCanvas);
function drawBg() {
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  for (let p of particles) {
    p.x+=p.dx; p.y+=p.dy; p.tw+=.02;
    if(p.x<0)p.x=bgCanvas.width; if(p.x>bgCanvas.width)p.x=0;
    if(p.y<0)p.y=bgCanvas.height; if(p.y>bgCanvas.height)p.y=0;
    bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(127,163,255,${.3+.3*Math.sin(p.tw)})`; bgCtx.shadowColor='#7fa3ff'; bgCtx.shadowBlur=6; bgCtx.fill(); bgCtx.shadowBlur=0;
  }
  requestAnimationFrame(drawBg);
}
drawBg();

/* ══════════════════════════════════════════════════
   YOUTUBE PLAYER
   Uses the official IFrame API. The player lives in
   a hidden off-screen div — audio plays normally.
   getVideoData() gives us title + author without
   needing any API key.
══════════════════════════════════════════════════ */
let ytPlayer     = null;
let ytReady      = false;
let ytPlaying    = false;
let ytLoaded     = false;
let ytVolume     = 70;
let ytProgressIv = null;
let ytPollIv     = null;
let ytLastVid    = null;

/* Called automatically by the YouTube API script */
function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-player', {
    height: '112', width: '200',
    playerVars: { autoplay: 0, controls: 0, disablekb: 1, modestbranding: 1, rel: 0, iv_load_policy: 3 },
    events: {
      onReady:       e => { ytReady = true; ytPlayer.setVolume(ytVolume); },
      onStateChange: onYTState,
      onError:       onYTError
    }
  });
}

function onYTState(e) {
  const S = YT.PlayerState;
  const dot = document.getElementById('yt-status-dot');
  if (e.data === S.PLAYING) {
    ytPlaying = true;
    document.getElementById('music-toggle').textContent = '⏸';
    document.getElementById('track-art').classList.add('playing');
    dot.className = 'yt-status-dot live';
    setYTStatus('Now playing');
    startProgress();
    pollTrack();
  } else if (e.data === S.PAUSED) {
    ytPlaying = false;
    document.getElementById('music-toggle').textContent = '▶';
    document.getElementById('track-art').classList.remove('playing');
    dot.className = 'yt-status-dot';
    setYTStatus('Paused');
    stopProgress();
  } else if (e.data === S.BUFFERING) {
    setYTStatus('Loading…');
  } else if (e.data === S.ENDED) {
    ytPlaying = false;
    document.getElementById('music-toggle').textContent = '▶';
    document.getElementById('track-art').classList.remove('playing');
    dot.className = 'yt-status-dot';
    setYTStatus('Ended');
    stopProgress();
  } else if (e.data === S.CUED || e.data === S.UNSTARTED) {
    setYTStatus('Ready — press play');
    updateTrackMeta();
  }
}

function onYTError(e) {
  const msgs = { 2:'Invalid URL', 5:'HTML5 player error', 100:'Video not found / private', 101:'Embedding disabled', 150:'Embedding disabled' };
  showNotify('⚠ ' + (msgs[e.data] || 'YouTube error'));
  document.getElementById('yt-status-dot').className = 'yt-status-dot error';
  setYTStatus('Error — try another URL');
}

/* ── Parse URL ── */
function parseYTUrl(raw) {
  raw = raw.trim();
  if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
  try {
    const u = new URL(raw);
    return {
      listId:  u.searchParams.get('list'),
      videoId: u.hostname === 'youtu.be'
        ? u.pathname.slice(1).split('?')[0]
        : u.searchParams.get('v')
    };
  } catch(_) {
    return {
      listId:  (raw.match(/[?&]list=([A-Za-z0-9_-]+)/)||[])[1] || null,
      videoId: (raw.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/)||[])[1] || null
    };
  }
}

/* ── Load ── */
function loadYTUrl() {
  if (!ytReady) { showNotify('⏳ Player initialising, try again in a moment…'); return; }
  const raw = document.getElementById('yt-url-input').value.trim();
  if (!raw) { showNotify('⚠ Paste a YouTube URL first.'); return; }

  const { listId, videoId } = parseYTUrl(raw);
  if (!listId && !videoId) { showNotify('⚠ No playlist or video ID found in that URL.'); return; }

  setYTStatus('Loading…');
  setTrackDisplay('Loading…', '');
  clearThumb();

  ['music-toggle','prev-btn','next-btn'].forEach(id => document.getElementById(id).disabled = false);

  if (listId) {
    ytPlayer.loadPlaylist({ listType: 'playlist', list: listId, index: 0, startSeconds: 0 });
    showNotify('✦ Playlist loading…');
  } else {
    ytPlayer.loadVideoById(videoId, 0);
    showNotify('✦ Video loading…');
  }

  ytLoaded = true;
  ytPlayer.setVolume(ytVolume);
}

document.getElementById('yt-url-input').addEventListener('keydown', e => { if (e.key === 'Enter') loadYTUrl(); });

/* ── Controls ── */
function ytTogglePlay() {
  if (!ytReady || !ytLoaded) return;
  ytPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}
function ytNext() { if (ytReady && ytLoaded) ytPlayer.nextVideo(); }
function ytPrev() { if (ytReady && ytLoaded) ytPlayer.previousVideo(); }

function ytSetVolume(v) {
  ytVolume = +v;
  document.getElementById('vol-slider').style.setProperty('--pct', v + '%');
  if (ytReady) ytPlayer.setVolume(ytVolume);
}
document.getElementById('vol-slider').style.setProperty('--pct', '70%');

function ytSeek(e) {
  if (!ytReady || !ytLoaded) return;
  const bar = document.getElementById('yt-progress-bar');
  const pct = Math.max(0, Math.min(1, e.offsetX / bar.clientWidth));
  const dur = ytPlayer.getDuration();
  if (dur > 0) ytPlayer.seekTo(pct * dur, true);
}

/* ── Progress ── */
function startProgress() {
  stopProgress();
  ytProgressIv = setInterval(() => {
    if (!ytReady || !ytPlaying) return;
    const dur = ytPlayer.getDuration();
    const cur = ytPlayer.getCurrentTime();
    if (dur > 0) document.getElementById('yt-progress-fill').style.width = ((cur/dur)*100) + '%';
  }, 1000);
}
function stopProgress() { if (ytProgressIv) { clearInterval(ytProgressIv); ytProgressIv = null; } }

/* ── Track metadata ── */
function pollTrack() {
  if (ytPollIv) clearInterval(ytPollIv);
  ytPollIv = setInterval(() => {
    if (!ytReady) return;
    try {
      const d = ytPlayer.getVideoData();
      if (d && d.video_id && d.video_id !== ytLastVid) {
        ytLastVid = d.video_id;
        updateTrackMeta();
      }
    } catch(_) {}
  }, 1500);
}

function updateTrackMeta() {
  if (!ytReady) return;
  try {
    const d = ytPlayer.getVideoData();
    if (!d || !d.title) return;

    let song   = d.title   || '';
    let artist = d.author  || '';

    /* Parse "Artist - Song", "Artist – Song", "Artist — Song" */
    const m = song.match(/^(.+?)\s*[-–—]\s*(.+)$/);
    if (m) {
      artist = m[1].trim();
      song   = m[2].trim();
    }

    /* Strip parenthetical junk: (Official Video), [Lyrics], (prod. X) etc. */
    song   = song.replace(/\s*[\(\[][^\)\]]{0,50}[\)\]]/g,'').trim();
    artist = artist.replace(/\s*[\(\[][^\)\]]{0,50}[\)\]]/g,'').trim();

    /* Truncate */
    if (song.length   > 42) song   = song.slice(0,40)   + '…';
    if (artist.length > 36) artist = artist.slice(0,34) + '…';

    setTrackDisplay(song || d.title, artist);

    /* Thumbnail from video ID */
    if (d.video_id) loadThumb(d.video_id);
  } catch(_) {}
}

function setTrackDisplay(name, artist) {
  const n = document.getElementById('track-name');
  const a = document.getElementById('track-artist');
  n.classList.add('fade');
  setTimeout(() => { n.textContent = name || '—'; a.textContent = artist || ''; n.classList.remove('fade'); }, 200);
}

function loadThumb(vid) {
  const img = document.getElementById('track-thumb');
  const art = document.getElementById('track-art');
  img.onload  = () => { img.classList.add('loaded'); art.classList.add('has-thumb'); };
  img.onerror = () => { img.classList.remove('loaded'); art.classList.remove('has-thumb'); };
  /* mqdefault = 320×180, a safe size that almost always exists */
  img.src = `https://img.youtube.com/vi/${vid}/mqdefault.jpg`;
}

function clearThumb() {
  const img = document.getElementById('track-thumb');
  const art = document.getElementById('track-art');
  img.src = ''; img.classList.remove('loaded'); art.classList.remove('has-thumb');
}

function setYTStatus(t) { document.getElementById('yt-status-txt').textContent = t; }

/* ══════════════════════════════════════════════════
   TIMER
══════════════════════════════════════════════════ */
const MODES = {
  focus: { label:'Focus Session',  secs: 25*60, color:'#7fa3ff' },
  break: { label:'Short Break',    secs:  5*60, color:'#7fd4a0' },
  long:  { label:'Long Break',     secs: 15*60, color:'#f4a97f' },
  sixty: { label:'60 Min Session', secs: 60*60, color:'#fbbf24' },
  deep:  { label:'Deep Work',      secs: 90*60, color:'#c084fc' }
};
const FOCUS_MSGS = ["Breathe. Then begin.","One thing at a time.","The work is the practice.","Quiet mind, clear path.","Stay. You're doing well.","Let nothing else exist.","This moment is enough.","Presence is the practice.","Deep work, deep peace.","Return, gently, always."];
const DEEP_MSGS  = ["You are locked in.","No distractions exist here.","Ninety minutes of pure depth.","This is your work. Honor it.","Silence is the sound of deep work.","The surface has faded. Only this.","Flow lives here.","Depth over breadth, always."];

let currentMode='focus', totalSecs=MODES.focus.secs, remaining=totalSecs;
let running=false, interval=null, pomodoroInCycle=0;
let todayMinutes=0, todaySessions=0, msgIdx=0, deepWorkActive=false;
const C = 2*Math.PI*110;

const $timer   = document.getElementById('timer-display');
const $label   = document.getElementById('session-label');
const $ring    = document.getElementById('ring-fill');
const $msg     = document.getElementById('focus-msg');
const $playBtn = document.getElementById('play-btn');

const fmt = s => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
function updateRing() { $ring.style.strokeDashoffset = C*(1-remaining/totalSecs); if(!deepWorkActive) $ring.style.stroke=MODES[currentMode].color; }
function updateDisplay() { $timer.textContent=fmt(remaining); updateRing(); }

function switchMode(mode) {
  if(deepWorkActive) return;
  if(running) stopTimer();
  currentMode=mode; totalSecs=MODES[mode].secs; remaining=totalSecs;
  $label.textContent=MODES[mode].label;
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.mode===mode));
  $ring.style.stroke=MODES[mode].color; updateDisplay();
  $msg.textContent=(mode==='focus'||mode==='sixty')?'Begin when you are ready.':'Rest well.';
}

function toggleTimer() { running ? stopTimer() : startTimer(); }

function startTimer() {
  running=true; $playBtn.textContent='⏸'; $playBtn.classList.add('running');
  deepWorkActive ? showMsg(DEEP_MSGS) : showMsg(FOCUS_MSGS);
  /* auto-play YouTube if loaded */
  if(ytLoaded&&ytReady&&!ytPlaying) { try { ytPlayer.playVideo(); } catch(_){} }
  interval=setInterval(()=>{
    if(remaining<=0){ clearInterval(interval); running=false; onSessionEnd(); return; }
    remaining--; updateDisplay();
    if(remaining%60===0&&['focus','sixty','deep'].includes(currentMode)){
      todayMinutes++; document.getElementById('stat-time').textContent=todayMinutes; saveStats();
    }
  },1000);
}
function stopTimer() { running=false; clearInterval(interval); $playBtn.textContent='▶'; $playBtn.classList.remove('running'); }
function resetTimer() { if(deepWorkActive) return; stopTimer(); remaining=totalSecs; updateDisplay(); $msg.textContent='Begin when you are ready.'; }
function skipSession() { if(deepWorkActive) return; stopTimer(); onSessionEnd(); }

function onSessionEnd() {
  $playBtn.textContent='▶'; $playBtn.classList.remove('running'); playBell();
  if(deepWorkActive){ exitDeepWork(); showNotify('✦ Deep Work complete. Remarkable.'); return; }
  if(currentMode==='focus'||currentMode==='sixty'){
    pomodoroInCycle++; todaySessions++;
    document.getElementById('stat-sessions').textContent=todaySessions;
    updateDots(); saveStats(); checkStreak();
    if(pomodoroInCycle>=4){ pomodoroInCycle=0; showNotify("✦ 4 sessions complete. Long break earned."); switchMode('long'); }
    else { showNotify("✦ Session complete. Short break earned."); switchMode('break'); }
  } else { showNotify("✦ Break over. Return to the work."); switchMode('focus'); }
}

function showMsg(pool) {
  $msg.style.opacity='0';
  setTimeout(()=>{ $msg.textContent=pool[msgIdx%pool.length]; $msg.style.opacity='1'; msgIdx++; },400);
  setTimeout(()=>{ if(running) showMsg(pool); },deepWorkActive?120000:180000);
}
function updateDots() { for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('done',i<pomodoroInCycle); }

/* ══════════════════════════════════════════════════
   DEEP WORK
══════════════════════════════════════════════════ */
function enterDeepWork() {
  if(running) stopTimer();
  deepWorkActive=true; currentMode='deep'; totalSecs=MODES.deep.secs; remaining=totalSecs;
  $label.textContent=MODES.deep.label;
  document.body.classList.add('deep-work-active','deep-mode');
  ['main-nav'].forEach(id=>document.getElementById(id).classList.add('deep-hide'));
  document.getElementById('session-pills').classList.add('fade-out');
  document.getElementById('session-dots').classList.add('fade-out');
  document.getElementById('deep-work-btn').classList.add('hidden');
  document.getElementById('deep-exit-btn').classList.remove('visible');
  document.getElementById('main-grid').classList.add('panel-collapsed');
  document.getElementById('side-panel').classList.add('deep-hidden');
  document.getElementById('panel-edge-btn').classList.add('deep-gone');
  document.getElementById('deep-work-status').classList.add('visible');
  updateDisplay(); showNotify('🔒 Deep Work locked. 90 minutes of pure focus.'); startTimer();
}
function exitDeepWork() {
  stopTimer(); deepWorkActive=false;
  document.body.classList.remove('deep-work-active','deep-mode');
  document.getElementById('main-nav').classList.remove('deep-hide');
  document.getElementById('session-pills').classList.remove('fade-out');
  document.getElementById('session-dots').classList.remove('fade-out');
  document.getElementById('deep-work-btn').classList.remove('hidden');
  document.getElementById('deep-work-status').classList.remove('visible');
  document.getElementById('panel-edge-btn').classList.remove('deep-gone');
  switchMode('focus'); showNotify('✦ Deep Work ended. Welcome back.');
}

/* ══════════════════════════════════════════════════
   DEEP MODE (visual)
══════════════════════════════════════════════════ */
let deepMode=false;
function toggleDeep(){
  if(deepWorkActive) return;
  deepMode=!deepMode;
  document.body.classList.toggle('deep-mode',deepMode);
  document.getElementById('main-nav').classList.toggle('deep-hide',deepMode);
  document.getElementById('session-pills').classList.toggle('fade-out',deepMode);
  document.getElementById('session-dots').classList.toggle('fade-out',deepMode);
  document.getElementById('side-panel').classList.toggle('deep-hidden',deepMode);
  document.getElementById('deep-exit-btn').classList.toggle('visible',deepMode);
  document.getElementById('panel-edge-btn').classList.toggle('deep-gone',deepMode);
  if(deepMode){ document.getElementById('main-grid').classList.add('panel-collapsed'); }
  else { document.getElementById('main-grid').classList.remove('panel-collapsed'); panelOpen=true; document.getElementById('panel-edge-btn').textContent='›'; }
  showNotify(deepMode?'✦ Deep mode. Everything else fades.':'✦ Returning to the light.');
}

/* ══════════════════════════════════════════════════
   PANEL
══════════════════════════════════════════════════ */
let panelOpen=true;
function togglePanel(){
  if(deepMode||deepWorkActive) return;
  panelOpen=!panelOpen;
  document.getElementById('main-grid').classList.toggle('panel-collapsed',!panelOpen);
  const e=document.getElementById('panel-edge-btn');
  e.textContent=panelOpen?'›':'‹'; e.classList.toggle('collapsed',!panelOpen);
}

/* ══════════════════════════════════════════════════
   AMBIENT
══════════════════════════════════════════════════ */
let ambCtx=null, ambNodes={}, activeAmb=null;
function mkNoise(type){
  if(!ambCtx) ambCtx=new(window.AudioContext||window.webkitAudioContext)();
  const buf=ambCtx.createBuffer(1,ambCtx.sampleRate*3,ambCtx.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=ambCtx.createBufferSource(); src.buffer=buf; src.loop=true;
  const g=ambCtx.createGain(); g.gain.value=0;
  const configs={rain:{type:'bandpass',freq:2000,Q:.5,vol:.15},cafe:{type:'lowpass',freq:1000,Q:1,vol:.07},night:{type:'highpass',freq:4000,Q:1,vol:.05},waves:{type:'lowpass',freq:600,Q:1,vol:.18}};
  const cfg=configs[type]||configs.rain;
  const f=ambCtx.createBiquadFilter(); f.type=cfg.type; f.frequency.value=cfg.freq; if(cfg.Q) f.Q.value=cfg.Q;
  if(type==='waves'){const lfo=ambCtx.createOscillator(),lg=ambCtx.createGain();lfo.frequency.value=.15;lg.gain.value=.12;lfo.connect(lg);lg.connect(f.frequency);lfo.start();ambNodes[type+'_lfo']=lfo;}
  src.connect(f); f.connect(g); g.connect(ambCtx.destination);
  g.gain.setTargetAtTime(cfg.vol,ambCtx.currentTime,.5); src.start(); return {source:src,gain:g};
}
function toggleAmbient(type){
  const btn=document.querySelector(`[data-amb="${type}"]`);
  if(activeAmb===type){
    if(ambNodes[type]){ambNodes[type].gain.gain.setTargetAtTime(0,ambCtx.currentTime,.5);setTimeout(()=>{ambNodes[type].source.stop();delete ambNodes[type];},600);}
    btn.classList.remove('active'); activeAmb=null;
  } else {
    if(activeAmb&&ambNodes[activeAmb]){
      ambNodes[activeAmb].gain.gain.setTargetAtTime(0,ambCtx.currentTime,.4);
      setTimeout(()=>{try{ambNodes[activeAmb].source.stop();}catch(_){}delete ambNodes[activeAmb];},500);
      document.querySelector(`[data-amb="${activeAmb}"]`)?.classList.remove('active');
    }
    ambNodes[type]=mkNoise(type); btn.classList.add('active'); activeAmb=type;
    showNotify(`✦ ${type[0].toUpperCase()+type.slice(1)} sounds — now playing.`);
  }
}

function playBell(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  [0,.3,.6].forEach((delay,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.value=[523.25,659.25,783.99][i]; o.type='sine';
    g.gain.setValueAtTime(.3,ctx.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+delay+2);
    o.connect(g);g.connect(ctx.destination);
    o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+2.5);
  });
}

let ntTimer=null;
function showNotify(msg){
  const el=document.getElementById('notify'); el.textContent=msg; el.classList.add('show');
  if(ntTimer) clearTimeout(ntTimer);
  ntTimer=setTimeout(()=>el.classList.remove('show'),3500);
}

/* ── Stats ── */
const TODAY=new Date().toDateString();
function loadStats(){ const r=localStorage.getItem('qp_focus_stats'); if(!r) return; const d=JSON.parse(r); if(d.date===TODAY){todayMinutes=d.minutes||0;todaySessions=d.sessions||0;document.getElementById('stat-time').textContent=todayMinutes;document.getElementById('stat-sessions').textContent=todaySessions;} }
function saveStats(){ localStorage.setItem('qp_focus_stats',JSON.stringify({date:TODAY,minutes:todayMinutes,sessions:todaySessions})); }
function loadStreak(){ const r=localStorage.getItem('qp_streak'); if(!r){renderStreak(0,[]);return;} const d=JSON.parse(r); renderStreak(d.streak||0,d.history||[]); }
function checkStreak(){ const r=localStorage.getItem('qp_streak'); let d=r?JSON.parse(r):{streak:0,history:[],lastDate:null}; const y=new Date(); y.setDate(y.getDate()-1); if(d.lastDate===TODAY) return; d.streak=d.lastDate===y.toDateString()?d.streak+1:1; d.lastDate=TODAY; if(!d.history.includes(TODAY)) d.history.push(TODAY); if(d.history.length>7) d.history=d.history.slice(-7); localStorage.setItem('qp_streak',JSON.stringify(d)); renderStreak(d.streak,d.history); }
function renderStreak(s,h){ document.getElementById('streak-val').textContent=s; const c=document.getElementById('streak-days'); c.innerHTML=''; const days=['Su','Mo','Tu','We','Th','Fr','Sa']; for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const el=document.createElement('div');el.className='day-dot'+(h.includes(d.toDateString())?' active':'');el.textContent=days[d.getDay()];c.appendChild(el);} }

loadStats(); loadStreak(); updateDisplay();
</script>
